name: Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval-offline:
    permissions:
      contents: read
    name: Eval (offline – schema validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run eval in offline mode
        run: python3 eval/run_cases.py --offline

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            eval/report.json
            eval/report.md
